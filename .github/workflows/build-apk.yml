name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Download YOLOv8n TFLite model (best for distant detection)
        run: |
          mkdir -p app/src/main/assets
          # YOLOv8 nano TFLite — best balance of speed + accuracy, detects far targets
          pip install ultralytics --quiet
          python3 -c "
          from ultralytics import YOLO
          model = YOLO('yolov8n.pt')
          model.export(format='tflite', imgsz=640)
          import shutil, glob
          tflite_files = glob.glob('**/*.tflite', recursive=True)
          if tflite_files:
              shutil.copy(tflite_files[0], 'app/src/main/assets/yolov8n.tflite')
              print('YOLOv8n TFLite exported:', tflite_files[0])
          " || echo "Python export failed, trying direct download..."
          
          # Fallback: download pre-converted YOLOv8n TFLite
          if [ ! -f app/src/main/assets/yolov8n.tflite ]; then
            curl -L "https://github.com/ultralytics/assets/releases/download/v0.0.0/yolov8n.tflite" \
              -o app/src/main/assets/yolov8n.tflite 2>/dev/null || true
          fi

          # Second fallback: EfficientDet-Lite2 (higher resolution, better for distant objects)
          if [ ! -f app/src/main/assets/yolov8n.tflite ] || [ ! -s app/src/main/assets/yolov8n.tflite ]; then
            echo "Using EfficientDet-Lite2 fallback..."
            curl -L "https://storage.googleapis.com/tfhub-lite-models/tensorflow/lite-model/efficientdet/lite2/detection/metadata/1.tflite" \
              -o app/src/main/assets/yolov8n.tflite
          fi

          ls -lh app/src/main/assets/

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download Gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          curl -L "https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
          wget -q "https://services.gradle.org/distributions/gradle-8.2-bin.zip" -O /tmp/gradle.zip && \
          unzip -j /tmp/gradle.zip "gradle-8.2/lib/gradle-wrapper.jar" -d gradle/wrapper/ 2>/dev/null || true
          # Direct download of wrapper jar
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar || true

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: AimVision-YOLOv8-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: AimVision-YOLOv8-release
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
